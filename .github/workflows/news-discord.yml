name: Newsletter Discord Sync (Manual Fallback)

on:
  workflow_dispatch:
    inputs:
      min_items_per_run:
        description: "Override min news items per run (1-15)"
        required: false
        default: ""
        type: string
      max_items_per_run:
        description: "Override max news items per run (1-15, must be >= min)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: newsletter-discord-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secret
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing"
            exit 1
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Fetch and send
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MIN_NEW_ITEMS_PER_RUN: ${{ github.event.inputs.min_items_per_run }}
          MAX_NEW_ITEMS_PER_RUN: ${{ github.event.inputs.max_items_per_run }}
          MAX_ITEM_AGE_DAYS: "3"
          TECH_PRIORITY_QUOTA: "3"
          GEEKNEWS_MAX_PER_RUN: "3"
          NEWSLETTER_DISPATCH_ORIGIN: "github-actions-manual"
        run: python scripts/fetch_and_send.py

      - name: Commit state files
        run: |
          if [ -n "$(git status --porcelain data/state.json data/news.json data/last_run.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state.json data/news.json data/last_run.json
            git commit -m "chore: update newsletter state"
            git push
          else
            echo "No state changes"
          fi
