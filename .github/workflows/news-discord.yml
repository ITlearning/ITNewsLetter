name: Newsletter Discord Sync

on:
  schedule:
    - cron: "0 */3 * * *"
    - cron: "30 1-23/3 * * *"
  workflow_dispatch:
    inputs:
      chain:
        description: "Run in self-dispatch chain mode (fallback when schedule is delayed)"
        required: false
        default: "false"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: newsletter-discord-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secret
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing"
            exit 1
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Fetch and send
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini-2025-04-14"
          OPENAI_FALLBACK_MODELS: "gpt-4.1-mini,gpt-4.1-nano-2025-04-14,gpt-4.1-nano,gpt-4o-mini-2024-07-18,gpt-4o-mini"
          MAX_NEW_ITEMS_PER_RUN: "5"
          MAX_ITEM_AGE_DAYS: "3"
          TECH_PRIORITY_QUOTA: "2"
          GEEKNEWS_MAX_PER_RUN: "3"
        run: python scripts/fetch_and_send.py

      - name: Commit state files
        run: |
          if [ -n "$(git status --porcelain data/state.json data/news.json data/last_run.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state.json data/news.json data/last_run.json
            git commit -m "chore: update newsletter state"
            git push
          else
            echo "No state changes"
          fi

      - name: Fallback self-dispatch (every 90 min)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.chain == 'true' && vars.SELF_DISPATCH_ENABLED != 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 5400
          payload='{"ref":"main","inputs":{"chain":"true"}}'
          status=$(curl -sS -o /tmp/dispatch_response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/news-discord.yml/dispatches" \
            -d "${payload}")
          if [ "${status}" != "204" ]; then
            echo "Self-dispatch failed with HTTP ${status}"
            cat /tmp/dispatch_response.txt
            exit 1
          fi
