name: News Archive Pages

on:
  push:
    branches:
      - main
    paths:
      - "data/news.json"
      - "config/taxonomy.yaml"
      - "config/lazy_detail_allowlist.json"
      - "scripts/build_archive_site.py"
      - "scripts/fetch_and_send.py"
      - "site/**"
      - ".github/workflows/news-archive-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build archive site
        env:
          LAZY_DETAIL_API_URL: ${{ vars.LAZY_DETAIL_API_URL }}
          DETAIL_BANNER_AD_CLIENT: ${{ vars.DETAIL_BANNER_AD_CLIENT }}
          DETAIL_BANNER_AD_SLOT: ${{ vars.DETAIL_BANNER_AD_SLOT }}
        run: python scripts/build_archive_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
