<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>$page_title</title>
    <meta name="description" content="$meta_description" />
    <link rel="canonical" href="$canonical_url" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="IT Dispatch Archive" />
    <meta property="og:title" content="$og_title" />
    <meta property="og:description" content="$og_description" />
    <meta property="og:url" content="$og_url" />
    <meta property="og:image" content="$og_image_url" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="$og_title" />
    <meta name="twitter:description" content="$og_description" />
    <meta name="twitter:image" content="$og_image_url" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3668470088067384"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="$stylesheet_path" />
  </head>
  <body>
    <div class="page-shell topic-page-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-dot" aria-hidden="true"></span>
          <strong class="brand-name"><a class="brand-link" href="$home_url">IT Dispatch Archive</a></strong>
        </div>
      </header>

      <main class="topic-main">
        <nav class="topic-breadcrumb" aria-label="breadcrumb">
          <a href="$home_url">Archive</a>
          <span aria-hidden="true">/</span>
          <a href="$topics_home_url">Topics</a>
          <span aria-hidden="true">/</span>
          <span>$slot_label</span>
        </nav>

        <section class="topic-hero">
          <p class="section-kicker">$period_tag</p>
          <div class="topic-hero-meta">
            <span class="badge badge-slot">$slot_label</span>
            <span class="topic-period-copy">$period_label</span>
          </div>
          <h1>$headline</h1>
          <div class="topic-summary-prose">
            $summary_html
          </div>
        </section>

        $cards_html
      </main>

      <footer class="site-footer" aria-label="사이트 정보">
        <p class="site-footer-copy">
          이 사이트는 IT 뉴스 브리핑과 큐레이션을 제공합니다. 원문은 각 출처에서 확인하세요.
        </p>
        <nav class="site-footer-nav" aria-label="정책 링크">
          <a href="${home_url}about.html">About</a>
          <a href="${home_url}editorial-policy.html">Editorial Policy</a>
          <a href="${home_url}privacy.html">Privacy</a>
          <a href="${home_url}contact.html">Contact</a>
        </nav>
      </footer>
    </div>
  </body>
</html>
