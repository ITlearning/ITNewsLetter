<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IT Dispatch Archive</title>
    <meta
      name="description"
      content="Discord로 보낸 IT 뉴스를 한 곳에서 다시 보는 아카이브."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-dot" aria-hidden="true"></span>
          <strong class="brand-name">IT Dispatch Archive</strong>
        </div>
      </header>

      <section class="stats-strip" id="hero-stats" aria-label="아카이브 통계">
        <div class="stats-intro">
          <p class="stats-kicker">Sent to Discord. Kept for later.</p>
          <p class="stats-description">
            이미 보낸 IT 뉴스를 다시 찾기 위한 아카이브입니다.
          </p>
        </div>
        <div class="hero-stats">
          <div class="stat-card">
            <span class="stat-label">Archive</span>
            <strong id="stat-total">-</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Sources</span>
            <strong id="stat-sources">-</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Updated</span>
            <strong id="stat-updated">-</strong>
          </div>
        </div>
      </section>

      <main class="layout">
        <section class="control-panel" aria-label="검색과 필터">
          <div class="control-grid">
            <label class="field">
              <span class="field-label">검색</span>
              <input
                id="search-input"
                class="field-input"
                type="search"
                placeholder="제목, 요약, 소스 검색"
                autocomplete="off"
              />
            </label>

            <label class="field">
              <span class="field-label">소스</span>
              <select id="source-filter" class="field-select">
                <option value="all">전체 소스</option>
              </select>
            </label>

            <label class="field">
              <span class="field-label">슬롯</span>
              <select id="slot-filter" class="field-select">
                <option value="all">전체 슬롯</option>
              </select>
            </label>

            <button id="reset-filters" class="ghost-button" type="button">초기화</button>
          </div>
        </section>

        <section class="results-header" aria-live="polite">
          <div>
            <h2 id="results-title">보낸 뉴스 전체</h2>
          </div>
          <p id="results-meta" class="results-meta">로딩 중…</p>
        </section>

        <section id="news-list" class="news-list" aria-live="polite"></section>
        <section id="empty-state" class="empty-state" hidden>
          <h2>조건에 맞는 뉴스가 없습니다.</h2>
          <p>검색어를 지우거나 필터를 바꿔보세요.</p>
        </section>
      </main>
    </div>

    <template id="news-card-template">
      <article class="news-card">
        <div class="card-meta">
          <time class="card-date"></time>
          <div class="card-topline">
            <span class="badge badge-source"></span>
            <span class="badge badge-slot"></span>
          </div>
        </div>
        <div class="card-body">
          <h3 class="card-title"></h3>
          <p class="card-original" hidden></p>
          <p class="card-summary"></p>
          <div class="matched-terms" hidden></div>
          <a class="card-link" target="_blank" rel="noreferrer">원문 보기</a>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
